[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "tokenfit"
version = "0.1.0"
description = "Estimate token counts for LLM models without API calls"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name = "Vaibhav Deshmukh"}]
keywords = ["python", "llm", "tokens", "tiktoken", "anthropic"]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[project.urls]
"Homepage" = "https://github.com/vdeshmukh203/tokenfit"
"Source" = "https://github.com/vdeshmukh203/tokenfit"

[tool.setuptools.packages.find]
where = ["src"]
